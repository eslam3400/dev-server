name: tailscale
services:
  tailscale:
    container_name: tailscale
    image: tailscale/tailscale:v1.90.8
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    entrypoint:
      - /bin/sh
      - -c
      - exec tailscaled --state=/var/lib/tailscale/tailscaled.state
    environment:
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - type: bind
        source: /DATA/AppData/tailscale
        target: /var/lib/tailscale
      - type: bind
        source: /dev/net/tun
        target: /dev/net/tun
    deploy:
      resources:
        reservations:
          memory: "134217728"
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Tailscale/icon.png
